# =============================================================================
# Analysis Targets Configuration
# (定义了 'horizon_sentinel.py' 和 'data_scheduler.py' 要处理的对象)
# =============================================================================

analysis_targets:
  # Stocks - require market data + news + fundamentals
  stocks:
    - AAPL     # Apple Inc.
    - MSFT     # Microsoft Corporation
    - GOOGL    # Alphabet Inc. Class A
    - AMZN     # Amazon.com Inc.
    - NVDA     # NVIDIA Corporation
    - AMD      # Advanced Micro Devices, Inc. (Semiconductors)
    - AVGO     # Broadcom Inc. (Semiconductors)
    - MU       # Micron Technology (HBM/Memory)
    - INTC     # Intel Corporation (老牌龙头/CHIPS法案/转型故事)
    - TSLA     # Tesla Inc.
    - META     # Meta Platforms Inc.
    - ADBE     # Adobe Inc. (SaaS/AI App)
    - JPM      # JPMorgan Chase & Co. (Financials)
    - WMT      # Walmart Inc. (Consumer Staples)
    - UNH      # UnitedHealth Group Inc. (Healthcare)
    - XOM      # Exxon Mobil Corporation (Energy)
    - BRK.B    # Berkshire Hathaway Inc. Class B
    - SNPS     # Synopsys Inc. (EDA Software)
    - CEG      # Constellation Energy Corp (Utilities/Nuclear)
    - VST      # Vistra Corp (Utilities/Nuclear)
    - PLTR     # Palantir Technologies (AI/Defense/Government Software)
    - MP       # MP Materials (美国稀土 pure-play / 战略矿产)
  
  # ETFs - require market data + news
  etfs:
    - SPY      # SPDR S&P 500 ETF Trust
    - QQQ      # Invesco QQQ Trust (Nasdaq-100)
    - GLD      # SPDR Gold Shares
    - SMH      # VanEck Semiconductor ETF (半导体板块温度计)

  # Benchmarks - 仅作为宏观背景基准，不单独出分析报告
  # (盘前盘后有真实成交量，替代了原 SPX/NDX/INDU 指数)
  benchmarks:
    - SPY      # S&P 500 代理 (与 etfs 复用，单独分析 + 基准双重身份)
    - QQQ      # Nasdaq-100 代理 (同上)
    - DIA      # Dow Jones 代理 (仅作基准，不单独分析)

  # Indices - 已废弃，改用 ETF (SPY/QQQ/DIA)
  # indices:
  #   - SPX      # S&P 500 Index
  #   - NDX      # Nasdaq-100 Index
  #   - INDU     # Dow Jones Industrial Average


# =============================================================================
# Data Requirements Definition
# (此部分定义了每种类型需要哪些数据)
# =============================================================================

data_requirements:
  stocks:
    - market_data
    - news
    - fundamentals

  etfs:
    - market_data
    - news

  benchmarks:
    - market_data

  # indices:  # 已废弃，改用 benchmarks
  #   - market_data


