# ── Chronicler秩序维护（每轮结束后判断 CONTINUE/TERMINATE + 精简本轮记忆）──
chronicler_moderation_output: |
  请严格按以下XML格式输出，不要输出任何XML以外的内容：

  <moderation>
    <decision>[CONTINUE 或 TERMINATE]</decision>
    <reason><![CDATA[一句话说明判断理由]]></reason>
    <round_memory>
      <zealot><![CDATA[本轮Zealot发言的精简版本]]></zealot>
      <reaper><![CDATA[本轮Reaper发言的精简版本]]></reaper>
      <fulcrum><![CDATA[本轮Fulcrum发言的精简版本]]></fulcrum>
    </round_memory>
  </moderation>

  ## 字段说明

  ### decision & reason
  - **decision**: CONTINUE=继续下一轮辩论 / TERMINATE=结束辩论进入最终报告
  - **reason**: 一句话说明判断依据（共识达成 / 陷入复读僵局 / 达到轮次上限 → TERMINATE；否则 CONTINUE）
  - 你不出action、不对标的发表任何立场，只做程序性决策

  ### round_memory（本轮记忆整理）
  - **目的**：为下一轮辩论提供记忆；尽量保持原样，只做最轻度的润色
  - **只删除以下明确的冗余**：
    * 寒暄客气（"感谢对方的分析"等）
    * 纯修辞性的形容词堆砌（不影响论据成立的那种）
    * 对前面几轮已复述过内容的重复铺垫
  - **其他一律保留**：
    * 核心论据和数据引用
    * action/operation数值和立场变化
    * 对对方的回应（认同/反驳/质疑）
    * 任何涉及未来判断、风险量化、具体价格的论述
  - **严禁**：
    * 改变原意、补充新内容、二次解读
    * 用自己的话重新组织（即使你觉得更清晰）
    * 拿不准是否冗余的一律保留
