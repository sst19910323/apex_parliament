# -----------------------------------------------------------------
# 文件路径: prompts/formats/debate_output.yaml
# 辩论阶段输出格式（XML版）
# 三辩论者(Zealot/Reaper/Fulcrum)共用同一格式；Personality靠soul yaml体现
# AI输出XML，解析端机械转换为JSON存储
# -----------------------------------------------------------------

# ── 三方初始化共用 ──
init_output: |
  请严格按以下XML格式输出，不要输出任何XML以外的内容。
  下方示例中方括号内的内容均为占位符说明，请根据"字段说明"填写真实值：

  <response>
    <debate_intensity>[LOW/MEDIUM/HIGH之一]</debate_intensity>
    <action>[0-100整数]</action>
    <operation_type>[操作类型枚举]</operation_type>
    <operation_target>[raw_data中该标的的真实价格数字]</operation_target>
    <operation_volume>[仓位规模枚举]</operation_volume>
    <mentality>
      <item name="[心态名]" probability="[0-1小数]"/>
      <item name="[心态名]" probability="[0-1小数]"/>
    </mentality>
    <summary_statement><![CDATA[一句话核心观点]]></summary_statement>
    <analysis_text><![CDATA[你的独立分析正文]]></analysis_text>
  </response>

  ## 字段说明

  - **debate_intensity**: LOW / MEDIUM / HIGH，你预期的辩论烈度
  - **action**: 0-100整数。0=激进卖出，50=持有，100=激进买入
  - **operation_type**: MARKET_ENTRY / LIMIT_ENTRY / HOLD_NEUTRAL / TRIM_POSITION / LIQUIDATE_NOW
  - **operation_target**: 交易操作必填具体价格锚点（数字）。
      * 市价单：填当前价作为锚点
      * 限价单：填你基于raw_data分析后认为合理的限价位
      * Hold：填"N/A"或关键支撑价
  - **operation_volume**: PILOT_SIZE / STANDARD_SIZE / AGGRESSIVE_SIZE / "N/A"（Hold时）
  - **mentality**: 1-5种最终心态及概率（总和通常为1，忽略极小项）
      可选心态name: buy_the_dip / fomo_buy / profit_taking / cut_losses_aggressively /
                     cut_losses_reluctantly / hold_and_ride_profit / trapped_hold /
                     wait_for_confirmation / wait_and_see / avoid_uncertainty /
                     bottom_fishing / short_squeeze_chase / sell_on_strength /
                     hedge_position / average_down / average_up / all_in /
                     rotate_sector / deleveraging / contrarian_bet
  - **summary_statement**: 用CDATA包裹，一句话核心观点
  - **analysis_text**: 用CDATA包裹，你的独立分析和初始方案。这是第一轮，没有对方观点需要回应。

