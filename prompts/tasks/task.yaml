# -----------------------------------------------------------------
# 文件路径: prompts/tasks/task.yaml
# 任务指令 + 数据模板
# -----------------------------------------------------------------

init_task: |
  ## 初始化分析
  标的：{symbol}
  
  这是第一轮，请独立分析并给出你的初始方案。
  
  ## 原始数据
  {raw_data}

# 辩论任务
debate_task: |
  ## 第 {turn} 轮辩论
  标的：{symbol}
  
  请基于原始数据和辩论记录，发表你这一轮的观点。
  
  ## 原始数据
  {raw_data}
  
  ## 辩论记录
  {debate_history}

# Chronicler 秩序维护任务（每轮辩论结束后）
moderation_task: |
  ## 秩序维护 | 第 {turn} 轮已结束
  标的：{symbol}

  你刚刚旁听完第 {turn} 轮辩论。请判断辩论是否应继续。

  ## 本轮三方发言
  {round_xml}

  ## 你的任务
  基于三方立场差距、是否陷入复读、是否达成共识等因素，
  输出 CONTINUE 或 TERMINATE，并用一句话说明理由。

# 最终报告任务（Chronicler专用）
finalize_task: |
  ## 最终报告阶段
  标的：{symbol}

  辩论已结束，请基于你旁听记录的完整辩论历史，撰写最终裁决报告。

  ## 完整辩论记录
  {debate_history}

# 签章任务（Zealot / Reaper / Fulcrum 三方通用）
signoff_task: |
  ## 签章确认
  标的：{symbol}

  史官的最终报告已出炉，请确认你的最终立场。

  ## 史官(Chronicler)的最终报告
  {final_report}

  ## 你的任务
  1. 确认你的最终action数值
  2. 如有保留意见，简要说明（一两句话）

# -----------------------------------------------------------------
# 原始数据模板
# -----------------------------------------------------------------

# Stock
raw_data_stock: |
  ### 宏观市场背景
  - 宏观与政治新闻: {general_news_data}
  - 经济基本面: {macro_data}
  - 市场情绪: {fear_greed_data}
  - 市场基准ETF技术分析（SPY/QQQ/DIA，含盘前盘后成交量）: {benchmark_data}

  ### 标的专属数据
  - 标的: {symbol}
  - 公司概况: {profile_data}
  - 技术面: {tech_data}
  - 基本面: {fundamentals_data}
  - 新闻: {news_data}

# ETF
raw_data_etf: |
  ### 宏观市场背景
  - 宏观与政治新闻: {general_news_data}
  - 经济基本面: {macro_data}
  - 市场情绪: {fear_greed_data}
  - 市场基准ETF技术分析（含盘前盘后成交量，不含本标的自身）: {benchmark_data}

  ### 标的专属数据
  - 标的: {symbol}
  - ETF概况: {profile_data}
  - 技术面: {tech_data}
  - 新闻: {news_data}

# General（宏观市场分析）
raw_data_general: |
  ### 宏观市场背景
  - 宏观与政治新闻: {general_news_data}
  - 经济基本面: {macro_data}
  - 市场情绪: {fear_greed_data}
  - 市场基准ETF技术分析（SPY/QQQ/DIA，含盘前盘后成交量）: {benchmark_data}

  注：这是宏观市场分析，operation_target填写QQQ预期价格（美元，保留2位小数）。