# -----------------------------------------------------------------
# 文件路径: prompts/tasks/task.yaml
# 任务指令 + 数据模板
# -----------------------------------------------------------------

init_task: |
  ## 初始化分析
  标的：{symbol}

  这是第一轮，请独立分析并给出你的初始方案。

  ## 原始数据
  {raw_data}

# 辩论任务
debate_task: |
  ## 第 {turn} 轮辩论
  标的：{symbol}

  请基于原始数据和辩论记录，发表你这一轮的观点。

  ## 原始数据
  {raw_data}

  ## 辩论记录
  {debate_history}

# Chronicler 秩序维护任务（每轮辩论结束后）
moderation_task: |
  ## 秩序维护 | 第 {turn} 轮已结束
  标的：{symbol}

  你刚刚旁听完第 {turn} 轮辩论。请判断辩论是否应继续。

  ## 本轮三方发言
  {round_xml}

  ## 你的任务
  基于三方立场差距、是否陷入复读、是否达成共识等因素，
  输出 CONTINUE 或 TERMINATE，并用一句话说明理由。

# 最终报告任务（Chronicler专用）
finalize_task: |
  ## 最终报告阶段
  标的：{symbol}

  辩论已结束，请基于你旁听记录的完整辩论历史，撰写最终裁决报告。

  ## 完整辩论记录
  {debate_history}

# 签章任务（Zealot / Reaper / Fulcrum 三方通用）
signoff_task: |
  ## 签章确认
  标的：{symbol}

  史官的最终报告已出炉，请确认你的最终立场。

  ## 史官(Chronicler)的最终报告
  {final_report}

  ## 你的任务
  1. 确认你的最终action数值
  2. 如有保留意见，简要说明（一两句话）

# -----------------------------------------------------------------
# 原始数据模板
# 数据中所有 leaf key 已加 "{symbol}_" 前缀（例如 QQQ_daily_technicals_ma_20_daily_val），
# 跨标的引用时禁止抹掉前缀。
# -----------------------------------------------------------------

# Stock（个股）
raw_data_stock: |
  ### 参考背景（用于风险与情景判断，非分析对象）
  - 宏观与政治新闻: {general_news_data}
  - 经济基本面（CPI/利率/GDP 等）: {macro_data}
  - 市场情绪指数（Fear & Greed / VIX）: {fear_greed_data}
  - 三大基准 ETF 技术指标（SPY/QQQ/DIA）: {benchmark_data}

  ### 分析对象 = {symbol}
  以下数据均属于 {symbol}（key 已带前缀）：
  - 公司概况: {profile_data}
  - 技术指标: {tech_data}
  - 基本面: {fundamentals_data}
  - 公司新闻: {news_data}

  ### 大盘是过滤器，不是装饰
  个股不独立于大盘。结合 {symbol} 行业属性选合适的基准 ETF 做相对强弱判断，
  把当前 regime（risk-on / risk-off / 板块轮动）纳入信号有效性评估，
  风险管理叠加市场层面触发条件。

# ETF（SPY/QQQ/GLD 等）
raw_data_etf: |
  ### 参考背景（用于风险与情景判断，非分析对象）
  - 宏观与政治新闻: {general_news_data}
  - 经济基本面: {macro_data}
  - 市场情绪指数: {fear_greed_data}
  - 其他基准 ETF 技术指标（已剔除本标的自身）: {benchmark_data}

  ### 分析对象 = {symbol}
  以下数据均属于 {symbol}（key 已带前缀）：
  - ETF 概况: {profile_data}
  - 技术指标: {tech_data}
  - 相关新闻: {news_data}

  ### 横向对比义务
  ETF 自身就是宽基/行业指数，但仍需用其他 ETF 与宏观做横向锚定，
  显式判断 {symbol} 相对其他基准的强弱。

# General（宏观市场分析）
raw_data_general: |
  ### 分析对象：美国大盘整体

  视角铁律：以 SPY、QQQ、DIA 三大基准 ETF **并列横向对比** + 宏观 + 经济 + 情绪
  综合判断市场整体走势。**严禁把任何单一 ETF 当作分析对象**——三者代表不同板块
  （宽基 / 科技重仓 / 工业金融），它们之间的分歧本身就是关键信号。

  - 宏观与政治新闻: {general_news_data}
  - 经济基本面: {macro_data}
  - 市场情绪指数: {fear_greed_data}
  - 三大基准 ETF 技术指标（并列分析对象，三者各司其职）: {benchmark_data}

  ### 三镜头使命
  - **SPY**（标普500）：宽基，判断 risk-on/risk-off 的首要镜头
  - **QQQ**（纳指100）：科技/AI 重仓（~50% Mag7 + 半导体），AI 叙事主战场
  - **DIA**（道指30）：工业/金融/必选消费为主，科技独立行情时的关键对照镜

  三个镜头各自给出独立趋势判断；reasoning 中至少各引用一次 SPY/QQQ/DIA 各自的指标。
  当三镜头方向分歧时（如 QQQ 偏多 / DIA 偏空），必须在 statement 中点明分化含义
  （sector rotation / risk-off in cyclicals 等），不得糊弄。

  ### operation_target 输出规则（GENERAL 专用）
  必须输出三个 ETF 的预期价位，格式严格为：
  ``SPY=612.50; QQQ=667.50; DIA=445.20``
  （分号分隔，等号连接，价位保留 2 位小数）
