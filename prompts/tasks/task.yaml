# -----------------------------------------------------------------
# 文件路径: prompts/tasks/task.yaml
# 任务指令 + 数据模板
# -----------------------------------------------------------------

init_task: |
  ## 初始化分析
  标的：{symbol}
  
  这是第一轮，请独立分析并给出你的初始方案。
  
  ## 原始数据
  {raw_data}

# 辩论任务
debate_task: |
  ## 第 {turn} 轮辩论
  标的：{symbol}
  
  请基于原始数据和辩论记录，发表你这一轮的观点。
  
  ## 原始数据
  {raw_data}
  
  ## 辩论记录
  {debate_history}

# 最终报告任务（Fulcrum专用）
finalize_task: |
  ## 最终报告
  标的：{symbol}
  
  辩论已结束，请撰写最终裁决报告。
  
  ## 原始数据
  {raw_data}
  
  ## 辩论记录
  {debate_history}

# 签章任务（Zealot和Reaper专用）
signoff_task: |
  ## 签章确认
  标的：{symbol}
  
  最终报告已出炉，请确认你的最终立场。
  
  ## Fulcrum的最终报告
  {final_report}
  
  ## 你的任务
  1. 确认你的最终action数值
  2. 如有保留意见，简要说明（一两句话）

